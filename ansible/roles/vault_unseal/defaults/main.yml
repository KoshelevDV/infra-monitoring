---
# Vault API port (used to build health/init/unseal URLs)
vault_api_port: 8200

# TLS settings
vault_tls_enabled: false
vault_tls_ca_cert: ""
vault_unseal_skip_tls_verify: false

# vault operator init params
vault_key_shares: 5
vault_key_threshold: 3

# Путь для сохранения ключей локально (на ansible controller)
vault_unseal_output_keys_dir: "vault-keys"

# Временный файл в RAM для ключей (удаляется в always)
vault_unseal_tmp_file: "/dev/shm/vault_keys_tmp.json"

# Статус-коды для /v1/sys/health: 200=ok, 501=not init, 503=sealed
vault_unseal_expected_status_codes: [200, 201, 400, 429, 472, 501, 503]

# Transit Auto-Unseal: если true — vault использует Transit/Cloud KMS
# При включении: инициализация использует recovery_shares/recovery_threshold
vault_transit_unseal_enabled: false
