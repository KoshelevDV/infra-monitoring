---
docker_users: []
# docker_users:
#   - user

# Docker packages to install
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# Apt keyring path
docker_apt_keyring: /etc/apt/keyrings/docker.asc

# Daemon configuration written to /etc/docker/daemon.json
# Set to empty dict {} to skip daemon.json management
docker_daemon_options: {}
# docker_daemon_options:
#   log-driver: "json-file"
#   log-opts:
#     max-size: "100m"
#     max-file: "3"
#   storage-driver: "overlay2"
