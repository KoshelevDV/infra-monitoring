---
# Server hardening playbook
# Runs: snapd removal, SSH hardening (modern crypto, DH cleanup), UFW, fail2ban, unattended-upgrades
#
# All parameters are in group_vars/<group>.yml — do NOT set vars here.
# VPS-specific overrides: inventories/production/group_vars/vps.yml
#
# Usage:
#   ansible-playbook -i inventories/production playbooks/server-hardening.yml
#   ansible-playbook -i inventories/production playbooks/server-hardening.yml --limit vps-01
#   ansible-playbook -i inventories/production playbooks/server-hardening.yml --check --diff
#
# WARNING: This playbook changes the SSH port. After the first run,
#          ansible_port in inventory should already reflect the new port.

- name: Server hardening
  hosts: vps
  become: true

  roles:
    - role: snapd_remove
    - role: ssh_hardening
    - role: ufw
    - role: fail2ban
    - role: unattended_upgrades
