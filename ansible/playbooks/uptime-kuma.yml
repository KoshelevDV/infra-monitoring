---
# Deploy Docker + Uptime Kuma
# Parameters: group_vars/vps.yml (or target group)
#
# Usage:
#   ansible-playbook -i inventories/production playbooks/uptime-kuma.yml
#   ansible-playbook -i inventories/production playbooks/uptime-kuma.yml --limit vps-01

- name: Deploy Uptime Kuma
  hosts: vps
  become: true

  roles:
    - role: docker
    - role: uptime_kuma
